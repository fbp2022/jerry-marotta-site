name: Update Yelp Rating
on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
permissions:
  contents: write
concurrency:
  group: update-yelp-rating
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch current Yelp rating
        env:
          YELP_API_KEY: ${{ secrets.YELP_API_KEY }}
        run: node scripts/update-yelp.mjs
      - name: Commit rating update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/yelp.json
          if git diff --cached --quiet; then
            echo "No Yelp rating changes."
          else
            git commit -m "Update Yelp rating"
            git push
          fi
